<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gemini AI Test</title>

<style>
body{
font-family:Arial;
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:600px;
background:#1f2937;
padding:20px;
border-radius:10px;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
font-size:18px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

#output{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:8px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>Gemini AI Test</h1>

<textarea id="prompt">
Write a YouTube automation workflow
</textarea>

<button onclick="generateAI()">
Generate
</button>

<div id="output">
Response will appear here...
</div>

</div>

<script>

const API_KEY = "AIzaSyDitMpzXZgjEICOwSez6D-N-hQYqiktXO4";

async function generateAI(){

const output = document.getElementById("output");

const prompt = document.getElementById("prompt").value;

output.innerHTML = "Generating...";

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
contents:[
{
parts:[
{
text:prompt
}
]
}
]
})
}
);

const data = await response.json();

console.log(data);

if(data.error){
output.innerHTML = "ERROR: " + data.error.message;
return;
}

const text =
data.candidates[0].content.parts[0].text;

output.innerHTML = text;

}catch(error){

output.innerHTML = error.message;

}

}

</script>

</body>
</html>
