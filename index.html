<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creator Hub Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>🚀 Creator Hub Pro</h1>

    <input type="text" id="search" placeholder="Search tools...">

    <div class="filters">
      <button onclick="filterCategory('All')">All</button>
      <button onclick="filterCategory('Chat')">Chat</button>
      <button onclick="filterCategory('Writing')">Writing</button>
      <button onclick="filterCategory('Image')">Image</button>
      <button onclick="filterCategory('Video')">Video</button>
      <button onclick="filterCategory('SEO')">SEO</button>
    </div>
  </header>

  <!-- TOOLS -->
  <div id="tools" class="grid"></div>

  <script src="script.js"></script>

</body>
</html>
