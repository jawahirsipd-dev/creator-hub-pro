<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Creator Hub Pro — AI Workflow Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0b0f1a;
  color:white;
}

header{
  text-align:center;
  padding:40px 20px;
}

h1{
  font-size:40px;
}

#cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#151c2e;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:40px;
  height:40px;
}

.card a{
  display:inline-block;
  margin-top:10px;
  color:#00d4ff;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <h1>🚀 AI Workflow Marketplace</h1>
  <p>Create • Automate • Grow</p>
</header>

<div id="cards"></div>

<script>
// ✅ WORKING DATA
const workflows = [
{
name:"YouTube Shorts Automation",
category:"Content",
url:"https://zapier.com",
description:"Create viral shorts automatically with AI."
},
{
name:"AI Blog Empire",
category:"Marketing",
url:"https://writesonic.com",
description:"Generate SEO blogs using AI."
},
{
name:"AI Faceless Channel",
category:"Content",
url:"https://invideo.io",
description:"Build faceless YouTube channels."
},
{
name:"AI Automation Hub",
category:"Automation",
url:"https://n8n.io",
description:"Build automation workflows visually."
},
{
name:"AI Coding Stack",
category:"Coding",
url:"https://cursor.com",
description:"AI-powered coding assistant workflow."
}
];

// ✅ SAFE LOGO FUNCTION
function getLogo(url){
  try{
    let domain = new URL(url).hostname.replace("www.","");
    return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
  }catch(e){
    return "https://via.placeholder.com/40";
  }
}

// ✅ RENDER CARDS
function renderCards(data){
  const container = document.getElementById("cards");
  container.innerHTML = "";

  data.forEach(item=>{
    container.innerHTML += `
      <div class="card">
        <img src="${getLogo(item.url)}" />
        <h3>${item.name}</h3>
        <p>${item.description}</p>
        <a href="${item.url}" target="_blank">Open Tool</a>
      </div>
    `;
  });
}

// ✅ START APP
renderCards(workflows);

</script>

</body>
</html>
