
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creator Hub Pro Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#050816;
color:white;
padding:40px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:30px;
}

form{
display:grid;
gap:20px;
background:#111827;
padding:30px;
border-radius:20px;
margin-bottom:40px;
}

input,textarea,select{
padding:14px;
border:none;
border-radius:12px;
background:#1f2937;
color:white;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#7c3aed;
color:white;
font-weight:700;
cursor:pointer;
}

.tools{
display:grid;
gap:20px;
}

.tool{
background:#111827;
padding:20px;
border-radius:18px;
}

.tool a{
color:#67e8f9;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>
Creator Hub Pro Admin
</h1>

<form id="toolForm">

<input type="text" id="name" placeholder="Tool Name" required>

<input type="text" id="category" placeholder="Category" required>

<input type="url" id="url" placeholder="Tool URL" required>

<textarea id="description" placeholder="Description"></textarea>

<button type="submit">
Add Tool
</button>

</form>

<div class="tools" id="toolsList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabase = window.supabase.createClient(
"https://YOURPROJECT.supabase.co",
"YOUR_PUBLISHABLE_KEY"
);

const form =
document.getElementById("toolForm");

const toolsList =
document.getElementById("toolsList");

async function loadTools(){

const { data } = await supabase
.from("tools")
.select("*")
.order("created_at",{ascending:false});

toolsList.innerHTML = data.map(tool => `

<div class="tool">

<h2>${tool.name}</h2>

<p>${tool.description}</p>

<br>

<a href="${tool.url}" target="_blank">
Visit Tool
</a>

</div>

`).join("");

}

form.addEventListener("submit", async(e)=>{

e.preventDefault();

const name =
document.getElementById("name").value;

const category =
document.getElementById("category").value;

const url =
document.getElementById("url").value;

const description =
document.getElementById("description").value;

await supabase
.from("tools")
.insert([{
name,
category,
url,
description
}]);

form.reset();

loadTools();

});

loadTools();

</script>

</body>
</html>
