<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Creator Hub Pro — AI Workflow Marketplace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Poppins, sans-serif;
  background: #0f0f1a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 700;
  background: #15152a;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1c1c33;
  padding: 15px;
  border-radius: 16px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: scale(1.05);
  background: #252547;
}

.logo {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.title {
  font-size: 16px;
  font-weight: 600;
}

.category {
  font-size: 12px;
  color: #aaa;
}

.desc {
  font-size: 12px;
  margin-top: 5px;
  color: #ccc;
}
</style>

</head>

<body>

<header>🚀 AI Workflow Marketplace</header>

<div class="container" id="cards"></div>

<script>
// ✅ SUPABASE CONFIG
const SUPABASE_URL = "https://dpjmlasbomyleogiimmy.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_ANON_KEY"; // replace this

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ✅ LOGO FUNCTION (auto fetch from domain)
function getLogo(url) {
  try {
    let domain = new URL(url).hostname.replace("www.", "");
    return `https://img.logo.dev/${domain}?token=demo`;
  } catch (e) {
    return "https://via.placeholder.com/40";
  }
}

// ✅ LOAD DATA
async function loadWorkflows() {
  const { data, error } = await supabase.from("tools").select("*");

  if (error) {
    console.log("Supabase Error:", error);
    return;
  }

  const container = document.getElementById("cards");
  container.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img class="logo" src="${getLogo(item.url)}" />
      <div class="title">${item.name}</div>
      <div class="category">${item.category}</div>
      <div class="desc">${item.description}</div>
    `;

    card.onclick = () => {
      window.open(item.url, "_blank");
    };

    container.appendChild(card);
  });
}

loadWorkflows();
</script>

</body>
</html>
