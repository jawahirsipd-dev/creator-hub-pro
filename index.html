<!DOCTYPE html>
<html>
<head>
<title>AI Workflow Builder</title>
<style>
body{
font-family:Arial;
background:#0f0f1a;
color:white;
margin:0;
padding:20px;
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
background:#7c3aed;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.card{
background:#1c1c33;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<h2>🚀 AI Workflow Builder System</h2>

<!-- CREATE WORKFLOW -->
<input id="name" placeholder="Workflow Name">

<textarea id="steps" placeholder="Steps (comma separated)"></textarea>

<textarea id="tools" placeholder="Tools (comma separated)"></textarea>

<button onclick="saveWorkflow()">Save Workflow</button>

<h3>Saved Workflows</h3>
<div id="list"></div>

<script>
let workflows = JSON.parse(localStorage.getItem("wf")) || [];

function saveWorkflow(){
let name = document.getElementById("name").value;
let steps = document.getElementById("steps").value.split(",");
let tools = document.getElementById("tools").value.split(",");

let data = {
id: Date.now(),
name,
steps,
tools
};

workflows.push(data);
localStorage.setItem("wf", JSON.stringify(workflows));
render();
}

function render(){
let list = document.getElementById("list");
list.innerHTML = "";

workflows.forEach(wf=>{
list.innerHTML += `
<div class="card">
<h3>${wf.name}</h3>

<p><b>Steps:</b></p>
<ul>
${wf.steps.map(s=>`<li>${s}</li>`).join("")}
</ul>

<p><b>Tools:</b> ${wf.tools.join(", ")}</p>
</div>
`;
});
}

render();
</script>

</body>
</html>
